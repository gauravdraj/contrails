name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test contrails-core.test.js
      - run: node --test worker/src/*.test.js
      - run: node smoke-boot.mjs
