<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07101b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Contrails</title>
<link id="app-favicon" rel="icon" type="image/svg+xml" sizes="any" href="favicon.svg?v=1.6">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg-base: #08111e;
  --bg-base-soft: rgba(8, 17, 30, 0.78);
  --bg-surface: rgba(10, 19, 33, 0.86);
  --bg-surface-strong: rgba(10, 19, 33, 0.94);
  --bg-card: rgba(15, 26, 42, 0.88);
  --bg-card-strong: rgba(18, 31, 49, 0.96);
  --bg-chip: rgba(255, 255, 255, 0.04);
  --border-soft: rgba(137, 164, 191, 0.16);
  --border-strong: rgba(126, 182, 223, 0.26);
  --text-strong: #f1f7fd;
  --text-main: #d5e0eb;
  --text-muted: #8da4bc;
  --text-soft: #5e7389;
  --accent: #69c7ff;
  --accent-soft: rgba(105, 199, 255, 0.16);
  --danger: #f87171;
  --danger-soft: rgba(248, 113, 113, 0.14);
  --success: #4ade80;
  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.34);
  --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.28);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background:
    radial-gradient(circle at top, rgba(42, 105, 148, 0.12), transparent 36%),
    linear-gradient(180deg, #07101b 0%, #0a1320 100%);
  color: var(--text-main);
  overflow: hidden;
  font-variant-numeric: tabular-nums;
}
body.noscroll { touch-action: none; }

#app { height: 100%; height: 100dvh; }
#map { height: 100%; }
.leaflet-container,
.leaflet-pane,
.leaflet-map-pane,
.leaflet-tile-container,
.leaflet-tile-pane,
.leaflet-overlay-pane {
  background: #07101b;
}
.leaflet-tile { background: #07101b; }
#panel {
  overflow-y: auto;
  padding: 12px 12px calc(18px + env(safe-area-inset-bottom, 0px));
  flex: 1;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
#panel::-webkit-scrollbar, #fids-body::-webkit-scrollbar { width: 0; height: 0; }

.card {
  margin-bottom: 10px;
  padding: 14px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  background: linear-gradient(180deg, rgba(17, 28, 45, 0.96) 0%, rgba(11, 20, 34, 0.92) 100%);
  box-shadow: var(--shadow-md);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}
.card:last-child { margin-bottom: 0; }
.card:active {
  transform: scale(0.995);
  background: linear-gradient(180deg, rgba(21, 35, 55, 0.98) 0%, rgba(13, 24, 39, 0.94) 100%);
}
.card.selected {
  border-color: rgba(105, 199, 255, 0.36);
  box-shadow: inset 3px 0 0 var(--accent), var(--shadow-md);
  background: linear-gradient(180deg, rgba(18, 33, 54, 0.98) 0%, rgba(14, 27, 44, 0.96) 100%);
}
.card.emergency {
  border-color: rgba(248, 113, 113, 0.32);
  box-shadow: inset 3px 0 0 var(--danger), var(--shadow-md);
}
.card .main { flex: 1; min-width: 0; }
.card .callsign {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--text-strong);
}
.card .callsign.unknown { color: var(--text-soft); font-style: italic; }
.card .callsign .priv-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.06);
  border-radius: 999px;
  padding: 2px 7px;
  margin-left: 6px;
  vertical-align: middle;
  letter-spacing: 0.04em;
}
.card .details {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 5px;
  line-height: 1.45;
}
.card .distance {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  text-align: right;
  white-space: nowrap;
  color: var(--text-strong);
  padding-left: 10px;
}
.card .distance-num { font-size: 16px; letter-spacing: -0.02em; }
.card .distance-unit { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
.card .bearing-tag {
  font-size: 10px;
  color: var(--accent);
  background: rgba(105, 199, 255, 0.12);
  border: 1px solid rgba(105, 199, 255, 0.18);
  border-radius: 999px;
  padding: 4px 7px;
  letter-spacing: 0.06em;
}
.card .route-line {
  font-size: 12px;
  color: var(--accent);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card .airline-name {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 6px;
  letter-spacing: 0;
}
.panel-empty {
  padding: 28px 18px;
  text-align: center;
  color: var(--text-muted);
  border: 1px dashed var(--border-soft);
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.03);
}

.vert-up { color: var(--success); }
.vert-down { color: var(--danger); }
.vert-level { color: var(--text-soft); }

#alert-bar {
  display: none;
  position: fixed;
  top: calc(10px + env(safe-area-inset-top, 0px));
  left: 12px;
  right: 12px;
  z-index: 1005;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  border: 1px solid rgba(248, 113, 113, 0.24);
  background: linear-gradient(180deg, rgba(74, 14, 14, 0.86) 0%, rgba(48, 11, 11, 0.92) 100%);
  color: #ffd6d6;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

#list-toggle {
  position: fixed;
  right: 12px;
  bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  z-index: 1000;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-surface);
  color: var(--text-main);
  border: 1px solid var(--border-strong);
  border-radius: 18px;
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  -webkit-tap-highlight-color: transparent;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  font-family: inherit;
  transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
}
#list-toggle:active { transform: translateY(1px); }
#list-toggle .label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
}
#list-toggle .count {
  min-width: 28px;
  height: 28px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(105, 199, 255, 0.16);
  color: var(--accent);
  border: 1px solid rgba(105, 199, 255, 0.2);
}

#list-sheet {
  position: fixed;
  inset: 0;
  z-index: 1200;
  visibility: hidden;
  pointer-events: none;
}
#list-sheet.open {
  visibility: visible;
  pointer-events: auto;
}
#list-backdrop {
  position: absolute;
  inset: 0;
  opacity: 0;
  background: rgba(4, 9, 16, 0.3);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: opacity 0.18s ease;
}
#list-sheet.open #list-backdrop {
  opacity: 1;
}
#list-panel {
  position: absolute;
  top: calc(12px + env(safe-area-inset-top, 0px));
  right: 12px;
  bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  width: min(420px, calc(100% - 24px));
  background: linear-gradient(180deg, rgba(12, 22, 37, 0.94) 0%, rgba(8, 16, 28, 0.98) 100%);
  border-radius: 24px;
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  opacity: 0;
  transform: translate3d(18px, 0, 0);
  transition: transform 0.18s ease, opacity 0.18s ease;
}
#list-sheet.open #list-panel {
  opacity: 1;
  transform: translate3d(0, 0, 0);
}
#list-grabber { display: none; }
#list-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-soft);
}
#list-heading { flex: 1; min-width: 0; }
#list-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-strong);
  letter-spacing: -0.01em;
}
#list-subtitle {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
}
#list-header .count { color: var(--accent); font-weight: 700; }
#list-header #status-time { color: var(--text-soft); }
#list-close {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-muted);
  font-size: 24px;
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
}
#list-close:hover { color: var(--text-strong); }

#map-controls {
  position: fixed;
  top: calc(12px + env(safe-area-inset-top, 0px));
  left: 12px;
  z-index: 980;
  width: min(360px, calc(100% - 88px));
  padding: 8px;
  border-radius: 20px;
  border: 1px solid var(--border-strong);
  background: linear-gradient(180deg, rgba(9, 18, 31, 0.84) 0%, rgba(8, 15, 26, 0.94) 100%);
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
  transition: width 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}
#map-controls.collapsed {
  width: min(236px, calc(100% - 100px));
}
#map-controls.expanded {
  width: min(360px, calc(100% - 24px));
  box-shadow: var(--shadow-lg);
}
#controls-toggle {
  width: 100%;
  border: none;
  background: transparent;
  color: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 6px 8px;
  cursor: pointer;
  font: inherit;
  -webkit-tap-highlight-color: transparent;
}
#controls-toggle-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
#controls-toggle-main {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-width: 0;
}
#controls-logo-shell,
#controls-logo-badge {
  position: relative;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  border: 1px solid rgba(105, 199, 255, 0.18);
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 10px 18px rgba(0,0,0,0.22);
}
#controls-logo-shell::after,
#controls-logo-badge::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: radial-gradient(circle at top, rgba(105, 199, 255, 0.18), transparent 62%);
  pointer-events: none;
}
#controls-logo-shell {
  width: 38px;
  height: 38px;
}
#controls-logo-badge {
  width: 40px;
  height: 40px;
}
#controls-logo-shell img,
#controls-logo-badge img {
  width: 24px;
  height: 24px;
  display: block;
}
#controls-toggle-label {
  font-size: 11px;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
#controls-compact-summary {
  margin-top: 2px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-strong);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#controls-toggle-icon {
  width: 28px;
  height: 28px;
  border-radius: 10px;
  border: 1px solid var(--border-soft);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-main);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
  flex-shrink: 0;
}
#controls-body {
  margin-top: 0;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  pointer-events: none;
  transform: translateY(-6px);
  transition: max-height 0.18s ease, opacity 0.18s ease, transform 0.18s ease, margin-top 0.18s ease;
}
#map-controls.expanded #controls-body {
  margin-top: 8px;
  max-height: 360px;
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
#controls-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
#controls-brand { min-width: 0; flex: 1; }
#controls-brand-line {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
#controls-brand-text {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  min-width: 0;
}
#controls-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-strong);
  letter-spacing: -0.02em;
}
#controls-subtitle {
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-muted);
}
#version-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid var(--border-soft);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text-soft);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  pointer-events: none;
}
#radius-pill {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  padding: 6px 10px;
  border-radius: 14px;
  border: 1px solid var(--border-soft);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-strong);
  flex-shrink: 0;
}
#radius-value {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.04em;
}
#radius-pill .unit {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
#radius-slider-wrap { margin-top: 12px; }
#radius-slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.section-label {
  font-size: 11px;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
#radius-slider-readout {
  font-size: 12px;
  color: var(--text-main);
  font-weight: 600;
}
#radius-slider {
  --fill: 44%;
  appearance: none;
  width: 100%;
  height: 28px;
  background: transparent;
  cursor: pointer;
}
#radius-slider:focus { outline: none; }
#radius-slider::-webkit-slider-runnable-track {
  height: 6px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--fill), rgba(255,255,255,0.08) var(--fill), rgba(255,255,255,0.08) 100%);
}
#radius-slider::-webkit-slider-thumb {
  appearance: none;
  width: 22px;
  height: 22px;
  margin-top: -8px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.38);
  background: linear-gradient(180deg, #f7fbff 0%, #dbe8f4 100%);
  box-shadow: 0 6px 16px rgba(0,0,0,0.24);
}
#radius-slider::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--fill), rgba(255,255,255,0.08) var(--fill), rgba(255,255,255,0.08) 100%);
}
#radius-slider::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.38);
  background: linear-gradient(180deg, #f7fbff 0%, #dbe8f4 100%);
  box-shadow: 0 6px 16px rgba(0,0,0,0.24);
}
#radius-marks {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-top: 6px;
  font-size: 10px;
  color: var(--text-soft);
  letter-spacing: 0.04em;
}
.control-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
#visibility-controls { margin-top: 12px; }
.ftag {
  font-size: 12px;
  font-weight: 600;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid var(--border-soft);
  color: var(--text-muted);
  background: var(--bg-chip);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.ftag.on {
  color: var(--text-strong);
  border-color: rgba(105, 199, 255, 0.34);
  background: rgba(105, 199, 255, 0.16);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
}

#loading {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: #0a0e17;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  color: var(--text-muted);
  gap: 16px;
}
#loading .spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.leaflet-tooltip.plane-label {
  background: rgba(8, 15, 26, 0.88);
  color: var(--text-main);
  border: none;
  box-shadow: none;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  pointer-events: none;
}
.leaflet-tooltip.plane-label::before { display: none; }
.leaflet-tooltip.airport-label {
  background: rgba(13, 24, 39, 0.92);
  color: #afc1d4;
  border: 1px solid rgba(122, 152, 183, 0.34);
  box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  pointer-events: auto;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.leaflet-tooltip.airport-label::before { display: none; }
.leaflet-tooltip.runway-label {
  background: rgba(10, 18, 30, 0.84);
  color: var(--text-muted);
  border: 1px solid rgba(96, 122, 146, 0.28);
  box-shadow: none;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  pointer-events: none;
}
.leaflet-tooltip.runway-label::before { display: none; }

.leaflet-popup-content-wrapper {
  background: linear-gradient(180deg, rgba(14, 26, 42, 0.98) 0%, rgba(10, 18, 31, 0.98) 100%);
  color: var(--text-main);
  border-radius: var(--radius-md);
  border: 1px solid var(--border-soft);
  box-shadow: var(--shadow-md);
}
.leaflet-popup-tip { background: rgba(14, 26, 42, 0.98); }
.leaflet-popup-content { margin: 12px 14px; font-size: 13px; line-height: 1.6; }
.leaflet-popup-content strong { color: var(--accent); font-size: 15px; }

#fids { position: fixed; inset: 0; z-index: 1500; display: none; flex-direction: column; }
#fids.open { display: flex; }
#fids-backdrop {
  flex: 1;
  min-height: 60px;
  background: linear-gradient(180deg, rgba(4, 9, 16, 0) 0%, rgba(4, 9, 16, 0.48) 100%);
}
#fids-sheet {
  max-height: 82vh;
  max-height: 82dvh;
  background: linear-gradient(180deg, rgba(12, 22, 37, 0.94) 0%, rgba(8, 16, 28, 0.98) 100%);
  border: 1px solid var(--border-soft);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}
#fids-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border-soft);
}
#fids-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-strong);
  letter-spacing: -0.02em;
}
#fids-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
#fids-close {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-muted);
  font-size: 28px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}
#fids-close:hover { color: var(--text-strong); }
#fids-tabs {
  display: flex;
  gap: 8px;
  padding: 10px 16px 0;
  border-bottom: 1px solid var(--border-soft);
}
.fids-tab {
  flex: 1;
  padding: 10px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 12px 12px 0 0;
  color: var(--text-soft);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
}
.fids-tab.active {
  color: var(--text-strong);
  background: rgba(105, 199, 255, 0.1);
  border-color: rgba(105, 199, 255, 0.2);
}
#fids-body {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 8px 12px calc(18px + env(safe-area-inset-bottom, 0px));
}
.fids-row {
  padding: 12px 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  background: linear-gradient(180deg, rgba(17, 28, 45, 0.96) 0%, rgba(11, 20, 34, 0.92) 100%);
  box-shadow: var(--shadow-md);
}
.fids-row:last-child { margin-bottom: 0; }
.fids-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.fids-flight-num { font-size: 15px; font-weight: 700; color: var(--text-strong); }
.fids-airline-name { font-size: 12px; color: var(--text-muted); margin-left: 8px; font-weight: 400; }
.fids-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
}
.fids-badge.green { color: var(--success); background: rgba(74,222,128,0.12); }
.fids-badge.yellow { color: #facc15; background: rgba(250,204,21,0.12); }
.fids-badge.orange { color: #fb923c; background: rgba(251,146,60,0.12); }
.fids-badge.red { color: var(--danger); background: rgba(248,113,113,0.12); }
.fids-badge.gray, .fids-badge { color: var(--text-muted); background: rgba(136,153,170,0.08); }
.fids-route { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
.fids-times { display: flex; gap: 14px; margin-top: 7px; font-size: 11px; color: var(--text-soft); flex-wrap: wrap; }
.fids-times span { white-space: nowrap; }
.fids-times .ft-actual { color: var(--text-main); font-weight: 600; }
.fids-empty {
  padding: 34px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  border: 1px dashed var(--border-soft);
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.03);
}
.fids-empty .spinner {
  width: 24px;
  height: 24px;
  border: 2px solid rgba(255,255,255,0.12);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}

@media (min-width: 760px) {
  #map-controls {
    width: 340px;
  }

  #map-controls.collapsed {
    width: 232px;
  }

  #list-panel {
    width: 420px;
  }

  #fids-sheet {
    max-height: 86dvh;
    width: min(720px, calc(100% - 24px));
    margin: 0 auto;
  }
}

  const ICON_SZ = { light: 24, turboprop: 26, bizjet: 24, narrowbody: 30, widebody: 40, quadjet: 44 };

  function sizeFromCategory(cat) {
    if (!cat) return null;
    switch (cat) {
      case "A1": case "A2": case "B1": case "B2": case "B4": case "B6": return "light";
      case "A3": return "narrowbody";
      case "A4": case "A5": case "A6": return "widebody";
      case "A7": return "heli";
      default: return null;
    }
  }

  function sizeClass(type, category) {
    if (!type) return sizeFromCategory(category) || "light";
    var t = type.toUpperCase();
    if (/^(EC\d|H1[2-9]\d|H60|R22|R44|R66|S76|S92|A1[0-9]\d|AS\d|B[024]\d\d|MD[5-9]\d|BK|K[A-Z]\d|MI\d|NH90)/.test(t)) return "heli";
    if (/^(C1[2-9]\d|C2[0-1]\d|P28|PA\d|SR2[02]|DA[24]\d|BE[23]\d|M20|TB[12]\d|DR4|RV\d|COL[34]|TRIN|P46T|PC12|GLST)/.test(t)) return "light";
    if (/^(AT[4-7]\d|DH8[A-D]|DHC[6-8]|SF34|SB20|B190|C208|PC[0-9]|TBM[0-9]|JS[2-4]\d|AN[2-3]\d|L410|DO[0-9]|J328|E120|BE[9A][0-9]|SW[34]|M28)/.test(t)) return "turboprop";
    if (/^(CRJ|E[1-2][0-9]\d|ERJ|GLF[2-7]|GL\dT|GLEX|G[2-7]\d\d|GA[5-7].|LJ\d|CL[0-9]|C[5-7]\d\d|C25|C56|C68|F[29][0-9]\d|FA[57]|H25|HA4|PRM|ASTR|GALX|E35L|E55P|EA50|SF50|PC24|P180)/.test(t)) return "bizjet";
    if (/^(A38\d|B74[0-9]|A34[0-9]|IL96|C5M?|A400|AN12)/.test(t)) return "quadjet";
    if (/^(B7[6-8].|A3[03].|A35.|MD1[01]|DC10|L101|IL[89]\d|C17|KC46|A310)/.test(t)) return "widebody";
    if (/^(A3[12]\d|A2[02]\d|A[12]\dN|B73[0-9]|B3[89]M|BCS[1-3]|B75[0-9]|MD[89]\d|B712|E295|MC21)/.test(t)) return "narrowbody";
    return sizeFromCategory(category) || "light";
  }

  function dimColor(hslStr) {
    var m = hslStr.match(/[\d.]+/g);
    if (!m || m.length < 3) return hslStr;
    var h = +m[0], s = +m[1], l = +m[2];
    return "hsl(" + h + "," + Math.round(s * 0.4) + "%," + Math.round(l * 0.7 + 20) + "%)";
  }

  const GROUND_COLOR = "hsl(210,15%,42%)";

  function planeIcon(track, aircraftType, priv, category, altFt, ground) {
    var color = ground ? GROUND_COLOR : altColor(altFt);
    if (priv) color = dimColor(color);
    var cls = sizeClass(aircraftType, category);
    var shape = SHAPES[cls] || SHAPES.narrowbody;
    var sz = ICON_SZ[cls] || 30;
    if (priv) sz = Math.round(sz * 0.8);
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + sz + '" height="' + sz + '" viewBox="' + shape[0] + '">' +
      '<g transform="rotate(' + (track || 0) + ',' + shape[1] + ',' + shape[2] + ')">' +
      '<path d="' + shape[4] + '" fill="' + color + '" stroke="#0a0e17" stroke-width="' + shape[3] + '"/>' +
      '</g></svg>';
    var half = sz / 2;
    return L.divIcon({ html: svg, iconSize: [sz, sz], iconAnchor: [half, half], className: "" });
  }

  // --- Map setup ---
  function initMap(lat, lng) {
    map = L.map("map", {
      center: [lat, lng],
      zoom: 11,
      zoomControl: false,
      attributionControl: false,
      preferCanvas: true,
      zoomSnap: 0.25,
      zoomDelta: 0.5,
      wheelPxPerZoomLevel: 140,
      zoomAnimation: true,
      zoomAnimationThreshold: 8,
      fadeAnimation: false,
      markerZoomAnimation: true,
      doubleClickZoom: !isIOSSafari,
      doubleTapDragZoom: isIOSSafari ? false : "center",
      doubleTapDragZoomOptions: { reverse: true }
    });
    map.createPane("airportTooltipPane");
    map.getPane("airportTooltipPane").style.zIndex = 700;
    map.createPane("focusMaskPane");
    map.getPane("focusMaskPane").style.zIndex = 680;
    map.getPane("focusMaskPane").style.pointerEvents = "none";
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 18,
      keepBuffer: 4,
      updateWhenZooming: false
    }).addTo(map);

    userMarker = L.circleMarker([lat, lng], {
      radius: 7, fillColor: "#5bbcf5", fillOpacity: 1,
      color: "#fff", weight: 2
    }).addTo(map);

    var _autoPanning = false;
    map.on("autopanstart", function() { _autoPanning = true; });
    map.on("movestart", function() {
      if (_autoPanning) { _autoPanning = false; return; }
      map.closePopup();
    });
    map.on("zoomend", function() {
      renderMap();
      restrictMapToRadius();
    });
    map.on("click", function() {
      if (Date.now() < ignoreMapClickUntil) return;
      if (!selectedAircraftId) return;
      selectedAircraftId = null;
      _lastPanelHtml = "";
      renderMap();
      renderPanel();
    });

    focusLayer = L.layerGroup().addTo(map);
    trailLayer = L.layerGroup().addTo(map);
    runwayLayer = L.layerGroup().addTo(map);
    airportLayer = L.layerGroup().addTo(map);
    aircraftLayer = L.layerGroup().addTo(map);
    L.control.attribution({ position: "bottomleft", prefix: false })
      .addAttribution('&copy; <a href="https://carto.com/">CARTO</a> | <a href="https://adsb.lol">adsb.lol</a>')
      .addTo(map);
    installIOSOneFingerZoom();
    map.on("moveend", function() {
      if (!applyingRadiusLock) restrictMapToRadius();
    });
  }

  function clampZoom(zoom) {
    var min = map && map.getMinZoom() != null ? map.getMinZoom() : 0;
    var max = map && map.getMaxZoom() != null ? map.getMaxZoom() : 18;
    return Math.max(min, Math.min(max, zoom));
  }

  function installIOSOneFingerZoom() {
    if (!isIOSSafari || !map) return;
    var el = map.getContainer();
    var lastTap = null;
    var gesture = null;

    function resetGesture() {
      if (map.dragging && !map.dragging.enabled()) map.dragging.enable();
      gesture = null;
    }

    function onTouchStart(e) {
      if (e.touches.length !== 1) {
        resetGesture();
        return;
      }
      var touch = e.touches[0];
      var now = Date.now();
      var point = { x: touch.clientX, y: touch.clientY };
      if (lastTap && now - lastTap.ts < 350 && Math.hypot(point.x - lastTap.x, point.y - lastTap.y) < 28) {
        if (map.dragging && map.dragging.enabled()) map.dragging.disable();
        ignoreMapClickUntil = now + 500;
        var anchorPoint = map.mouseEventToContainerPoint({ clientX: touch.clientX, clientY: touch.clientY });
        gesture = {
          anchorLatLng: map.containerPointToLatLng(anchorPoint),
          startY: touch.clientY,
          startZoom: map.getZoom(),
          moved: false
        };
        lastTap = null;
        e.preventDefault();
        e.stopPropagation();
      } else {
        lastTap = { ts: now, x: point.x, y: point.y };
      }
    }

    function onTouchMove(e) {
      if (!gesture || e.touches.length !== 1) return;
      var dy = e.touches[0].clientY - gesture.startY;
      if (Math.abs(dy) > 6) gesture.moved = true;
      var targetZoom = clampZoom(gesture.startZoom + dy / 90);
      map.setZoomAround(gesture.anchorLatLng, targetZoom, { animate: false });
      e.preventDefault();
      e.stopPropagation();
    }

    function onTouchEnd(e) {
      if (!gesture) return;
      if (!gesture.moved) {
        map.setZoomAround(gesture.anchorLatLng, clampZoom(gesture.startZoom + 1), { animate: true });
      }
      ignoreMapClickUntil = Date.now() + 500;
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      resetGesture();
    }

    el.addEventListener("touchstart", onTouchStart, { passive: false });
    el.addEventListener("touchmove", onTouchMove, { passive: false });
    el.addEventListener("touchend", onTouchEnd, { passive: false });
    el.addEventListener("touchcancel", resetGesture, { passive: true });
  }

  function syncUrlState() {
    params.set("radius", String(radiusKm));
    var query = params.toString();
    history.replaceState(null, "", query ? "?" + query : location.pathname);
  }

  function updateControlsCompactSummary(visibleCount) {
    var el = document.getElementById("controls-compact-summary");
    if (!el) return;
    if (visibleCount == null) {
      visibleCount = 0;
      for (var i = 0; i < aircraft.length; i++) {
        if (!isFiltered(aircraft[i])) visibleCount++;
      }
    }
    var summary = radiusKm + " km";
    if (visibleCount > 0) summary += " · " + visibleCount + " traffic";
    else if (aircraft.length) summary += " · quiet";
    else summary += " · scanning";
    el.textContent = summary;
  }

  function setControlsExpanded(expanded) {
    var wrap = document.getElementById("map-controls");
    var toggle = document.getElementById("controls-toggle");
    var icon = document.getElementById("controls-toggle-icon");
    if (!wrap || !toggle || !icon) return;
    wrap.classList.toggle("expanded", !!expanded);
    wrap.classList.toggle("collapsed", !expanded);
    toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
    icon.textContent = expanded ? "-" : "+";
  }

  function updateRadiusUi() {
    var radiusValue = document.getElementById("radius-value");
    var radiusReadout = document.getElementById("radius-slider-readout");
    var radiusSlider = document.getElementById("radius-slider");
    var valueText = radiusKm + " km";
    if (radiusValue) radiusValue.textContent = String(radiusKm);
    if (radiusReadout) radiusReadout.textContent = valueText;
    if (radiusSlider) {
      radiusSlider.value = String(radiusKm);
      var fill = ((radiusKm - MIN_RADIUS_KM) / (MAX_RADIUS_KM - MIN_RADIUS_KM)) * 100;
      radiusSlider.style.setProperty("--fill", fill + "%");
    }
    updateControlsCompactSummary();
  }

  function updateFilterButtons() {
    var btns = document.querySelectorAll("[data-f]");
    for (var i = 0; i < btns.length; i++) {
      var key = btns[i].getAttribute("data-f");
      btns[i].classList.toggle("on", !!filters[key]);
    }
  }

  function clearRadiusFetchTimer() {
    if (!radiusFetchTimer) return;
    clearTimeout(radiusFetchTimer);
    radiusFetchTimer = null;
  }

  function scheduleRadiusFetch(delayMs) {
    clearRadiusFetchTimer();
    radiusFetchTimer = setTimeout(function() {
      radiusFetchTimer = null;
      fetchAircraft();
    }, delayMs);
  }

  function circleRing(lat, lng, radiusKm, points) {
    var ring = [];
    var earthKm = 6371;
    var phi1 = lat * Math.PI / 180;
    var lambda1 = lng * Math.PI / 180;
    var angular = radiusKm / earthKm;
    for (var i = 0; i <= points; i++) {
      var bearing = 2 * Math.PI * i / points;
      var sinPhi1 = Math.sin(phi1);
      var cosPhi1 = Math.cos(phi1);
      var sinAngular = Math.sin(angular);
      var cosAngular = Math.cos(angular);
      var sinPhi2 = sinPhi1 * cosAngular + cosPhi1 * sinAngular * Math.cos(bearing);
      var phi2 = Math.asin(sinPhi2);
      var lambda2 = lambda1 + Math.atan2(
        Math.sin(bearing) * sinAngular * cosPhi1,
        cosAngular - sinPhi1 * sinPhi2
      );
      ring.push([
        phi2 * 180 / Math.PI,
        ((lambda2 * 180 / Math.PI + 540) % 360) - 180
      ]);
    }
    return ring;
  }

  function clampCenterToRadius(latlng) {
    if (!map || userLat == null || userLng == null) return latlng;
    var origin = L.latLng(userLat, userLng);
    var dist = map.distance(origin, latlng);
    var radiusM = radiusKm * 1000;
    if (!isFinite(dist) || dist <= radiusM) return latlng;
    var scale = radiusM / dist * 0.995;
    return L.latLng(
      userLat + (latlng.lat - userLat) * scale,
      userLng + (latlng.lng - userLng) * scale
    );
  }

  function restrictMapToRadius() {
    if (!map || userLat == null || userLng == null) return;
    var center = map.getCenter();
    var clamped = clampCenterToRadius(center);
    if (Math.abs(clamped.lat - center.lat) < 1e-7 && Math.abs(clamped.lng - center.lng) < 1e-7) return;
    applyingRadiusLock = true;
    map.panTo(clamped, { animate: false });
    applyingRadiusLock = false;
  }

  function updateFocusView(fitView) {
    if (!map || userLat == null || userLng == null || !focusLayer) return;
    var center = [userLat, userLng];
    var radiusM = radiusKm * 1000;
    var innerRing = circleRing(userLat, userLng, radiusKm, 96);
    var outerRing = [[-89.9, -179.9], [-89.9, 179.9], [89.9, 179.9], [89.9, -179.9]];

    if (!focusMask) {
      focusMask = L.polygon([outerRing, innerRing], {
        stroke: false,
        fillColor: "#000",
        fillOpacity: 0.62,
        interactive: false,
        fillRule: "evenodd",
        pane: "focusMaskPane"
      }).addTo(focusLayer);
    } else {
      focusMask.setLatLngs([outerRing, innerRing]);
    }

    if (!focusCircle) {
      focusCircle = L.circle(center, {
        radius: radiusM,
        color: "#5bbcf5",
        weight: 1.6,
        opacity: 0.9,
        fill: false,
        interactive: false,
        pane: "focusMaskPane"
      }).addTo(focusLayer);
    } else {
      focusCircle.setLatLng(center);
      focusCircle.setRadius(radiusM);
    }

    var bounds = focusCircle.getBounds();
    var minZoom = map.getBoundsZoom(bounds, false, [18, 18]);
    if (isFinite(minZoom)) {
      map.setMinZoom(minZoom);
      if (map.getZoom() < minZoom) map.setZoom(minZoom, { animate: false });
    }
    map.options.maxBoundsViscosity = 1.0;
    map.setMaxBounds(bounds.pad(0.04));
    if (fitView) {
      applyingRadiusLock = true;
      map.fitBounds(bounds, { padding: [18, 18], animate: false });
      applyingRadiusLock = false;
    }
    restrictMapToRadius();
  }

  function setRadiusKm(nextRadius, options) {
    options = options || {};
    nextRadius = normalizeRadiusKm(nextRadius);
    var changed = nextRadius !== radiusKm;
    if (changed) radiusKm = nextRadius;
    syncUrlState();
    updateRadiusUi();
    if (changed) resetInterpolationSamples();
    updateFocusView(options.fitView !== false);
    renderAirports();
    renderRunways();
    renderMap();
    renderPanel();
    updateStatus();
    updateAlerts();
    if (options.fetchMode === "none") return;
    if (options.fetchMode === "debounced") {
      scheduleRadiusFetch(options.fetchDelay || 240);
      return;
    }
    clearRadiusFetchTimer();
    fetchAircraft();
  }

  function updateUserPosition(lat, lng) {
    var movedKm = userLat != null && userLng != null ? haversineKm(userLat, userLng, lat, lng) : 0;
    userLat = lat;
    userLng = lng;
    if (userMarker) userMarker.setLatLng([lat, lng]);
    refreshAircraftProximity();
    if (movedKm > 0.05) resetInterpolationSamples();
    updateFocusView(false);
    renderAirports();
    renderRunways();
    renderMap();
    renderPanel();
    updateStatus();
    updateAlerts();
  }

  // --- Data fetching ---
  async function fetchAircraft() {
    if (userLat === null) return;
    var url = adsbUrl("/lat/" + userLat.toFixed(4) + "/lon/" + userLng.toFixed(4) + "/dist/" + radiusKm);

    try {
      var resp = await fetch(url);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      var data = await resp.json();
      workerOk = true;
      processAircraft(data.ac || []);
    } catch (err) {
      if (workerOk && !isLocal) {
        workerOk = false;
        return fetchAircraft();
      }
      document.getElementById("status-text").textContent = "Error: " + err.message;
      var controlsSubtitle = document.getElementById("controls-subtitle");
      if (controlsSubtitle) controlsSubtitle.textContent = "Live data unavailable";
      updateControlsCompactSummary(0);
    }
  }

  function processAircraft(ac) {
    var now = Date.now();
    if (lastFetchTs) fetchInterval = fetchInterval * 0.7 + (now - lastFetchTs) * 0.3;
    lastFetchTs = now;
    aircraft = [];
    for (var i = 0; i < ac.length; i++) {
      var s = ac[i];
      var isGround = s.alt_baro === "ground";
      if (!isGround && s.alt_baro == null) continue;
      if (s.lat == null || s.lon == null) continue;
      if (s.category && /^C/.test(s.category)) continue;
      if (sizeClass(s.t || null, s.category || null) === "heli") continue;
      if (s.seen != null && s.seen > 15) continue;
      var heading = s.track != null ? s.track : (s.true_heading != null ? s.true_heading : s.mag_heading);
      if (isGround && heading == null) continue;

      var callsign = (s.flight || "").trim() || null;
      var priv = isPrivate(callsign, s.t || null, s.category || null);
      var squawk = s.squawk || null;
      var emerg = s.emergency && s.emergency !== "none" ? s.emergency : null;
      var metrics = proximityMetrics(s.lat, s.lon, s.dir != null ? s.dir : 0);

      aircraft.push({
        icao24: s.hex,
        callsign: callsign,
        aircraftType: s.t || null,
        category: s.category || null,
        registration: s.r || null,
        lat: s.lat, lng: s.lon,
        altFt: isGround ? null : (typeof s.alt_baro === "number" ? Math.round(s.alt_baro) : null),
        ground: isGround,
        speedKts: s.gs != null ? Math.round(s.gs) : null,
        track: heading,
        vRate: s.baro_rate != null ? s.baro_rate / 60 : null,
        distKm: metrics.distKm,
        bearingDeg: metrics.bearingDeg,
        cardinal: metrics.cardinal,
        private: priv,
        mach: s.mach || null,
        ias: s.ias != null ? Math.round(s.ias) : null,
        oat: s.oat != null ? Math.round(s.oat) : null,
        windDir: s.wd != null ? Math.round(s.wd) : null,
        windSpd: s.ws != null ? Math.round(s.ws) : null,
        navAlt: s.nav_altitude_mcp || s.nav_altitude_fms || null,
        squawk: squawk,
        emergency: emerg,
        seen: s.seen != null ? s.seen : null,
        seenPos: s.seen_pos != null ? s.seen_pos : null,
        roll: s.roll != null ? Math.round(s.roll * 10) / 10 : null
      });
    }

    sortAircraftList();

    for (var j = 0; j < aircraft.length; j++) {
      var a = aircraft[j];
      if (!posHistory[a.icao24]) posHistory[a.icao24] = [];
      var h = posHistory[a.icao24];
      var reportTs = now - Math.max(0, (a.seenPos || 0) * 1000);
      seedSyntheticTrail(h, a, reportTs);
      var lastPt = h.length ? h[h.length - 1] : null;
      if (lastPt && reportTs <= lastPt[2]) reportTs = lastPt[2] + 1;
      var breakBefore = !!trailBreakPending[a.icao24] && !!lastPt;
      if (trailBreakPending[a.icao24]) delete trailBreakPending[a.icao24];
      var moved = !lastPt ||
        breakBefore ||
        Math.abs(lastPt[0] - a.lat) > 1e-5 ||
        Math.abs(lastPt[1] - a.lng) > 1e-5 ||
        lastPt[4] !== a.ground ||
        reportTs - lastPt[2] > Math.max(1500, fetchInterval * 0.9);
      if (moved) h.push([a.lat, a.lng, reportTs, a.altFt, a.ground, breakBefore]);
      pruneSeededTrailPrefix(h);
      if (h.length > 120) h.splice(0, h.length - 120);
    }

    renderMap();
    renderPanel();
    updateStatus();
    updateAlerts();
    fetchRoutes();
  }

  async function fetchRoutes() {
    if (!aircraft.length) return;
    var needed = [];
    for (var i = 0; i < aircraft.length; i++) {
      var a = aircraft[i];
      if (a.callsign && !a.private && !routeCache[a.callsign]) {
        needed.push({ callsign: a.callsign, lat: a.lat, lng: a.lng });
      }
    }
    if (!needed.length) return;
    try {
      var resp = await fetch(routeUrl("/routeset"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ planes: needed })
      });
      if (!resp.ok) return;
      var routes = await resp.json();
      for (var j = 0; j < routes.length; j++) {
        var r = routes[j];
        if (!r.callsign || !r._airports || !r._airports.length) continue;
        var locs = r._airports.map(function(ap) { return ap.location || ap.iata; });
        var iatas = r._airport_codes_iata || r.airport_codes || "";
        routeCache[r.callsign] = {
          display: locs.join(" \u2192 "),
          iata: iatas.replace(/-/g, " \u2192 ")
        };
      }
      renderPanel();
    } catch (e) {}
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function bearingDegrees(lat1, lon1, lat2, lon2) {
    var phi1 = lat1 * Math.PI / 180;
    var phi2 = lat2 * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var y = Math.sin(dLon) * Math.cos(phi2);
    var x = Math.cos(phi1) * Math.sin(phi2) -
      Math.sin(phi1) * Math.cos(phi2) * Math.cos(dLon);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function roundTenths(value) {
    return Math.round(value * 10) / 10;
  }

  function proximityMetrics(lat, lng, fallbackBearing) {
    var bearing = fallbackBearing != null ? fallbackBearing : 0;
    var distKm = null;
    if (userLat != null && userLng != null) {
      distKm = haversineKm(userLat, userLng, lat, lng);
      bearing = bearingDegrees(userLat, userLng, lat, lng);
    }
    return {
      distKm: distKm != null ? roundTenths(distKm) : null,
      bearingDeg: bearing,
      cardinal: cardinalDir(bearing)
    };
  }

  function updateAircraftProximity(a) {
    var metrics = proximityMetrics(a.lat, a.lng, a.bearingDeg);
    a.distKm = metrics.distKm;
    a.bearingDeg = metrics.bearingDeg;
    a.cardinal = metrics.cardinal;
  }

  function sortAircraftList() {
    aircraft.sort(function(a, b) {
      if (a.emergency && !b.emergency) return -1;
      if (!a.emergency && b.emergency) return 1;
      if (a.ground && !b.ground) return 1;
      if (!a.ground && b.ground) return -1;
      var distA = a.distKm != null ? a.distKm : 999;
      var distB = b.distKm != null ? b.distKm : 999;
      return distA - distB;
    });
  }

  function refreshAircraftProximity() {
    if (userLat == null || userLng == null || !aircraft.length) return;
    for (var i = 0; i < aircraft.length; i++) updateAircraftProximity(aircraft[i]);
    sortAircraftList();
  }

  function resetInterpolationSamples() {
    for (var id in extraState) {
      if (extraState[id] && extraState[id].samples) {
        extraState[id].samples = extraState[id].samples.slice(-1);
      }
    }
  }

  function projectLatLng(lat, lng, bearingDeg, distanceMeters) {
    if (!distanceMeters) return [lat, lng];
    var earthRadius = 6371000;
    var angular = distanceMeters / earthRadius;
    var bearing = bearingDeg * Math.PI / 180;
    var phi1 = lat * Math.PI / 180;
    var lambda1 = lng * Math.PI / 180;
    var sinPhi1 = Math.sin(phi1);
    var cosPhi1 = Math.cos(phi1);
    var sinAngular = Math.sin(angular);
    var cosAngular = Math.cos(angular);
    var sinPhi2 = sinPhi1 * cosAngular + cosPhi1 * sinAngular * Math.cos(bearing);
    var phi2 = Math.asin(sinPhi2);
    var lambda2 = lambda1 + Math.atan2(
      Math.sin(bearing) * sinAngular * cosPhi1,
      cosAngular - sinPhi1 * sinPhi2
    );
    return [
      phi2 * 180 / Math.PI,
      ((lambda2 * 180 / Math.PI + 540) % 360) - 180
    ];
  }

  function seedSyntheticTrail(history, a, reportTs) {
    if (history.length || a.ground || a.track == null || a.speedKts == null || a.speedKts < SEEDED_MIN_SPEED_KTS) return;
    var speedMs = a.speedKts * 0.514444;
    var stepMs = SEEDED_TRAIL_WINDOW_MS / SEEDED_TRAIL_POINTS;
    var reverseTrack = (a.track + 180) % 360;
    for (var i = SEEDED_TRAIL_POINTS; i >= 1; i--) {
      var ageMs = stepMs * i;
      var point = projectLatLng(a.lat, a.lng, reverseTrack, speedMs * ageMs / 1000);
      if (userLat != null && userLng != null && haversineKm(userLat, userLng, point[0], point[1]) > radiusKm) continue;
      history.push([point[0], point[1], reportTs - ageMs, a.altFt, false, false, true]);
    }
  }

  function pruneSeededTrailPrefix(history) {
    var realCount = 0;
    for (var i = 0; i < history.length; i++) {
      if (!history[i][6]) realCount++;
    }
    if (realCount < 3) return;
    while (history.length && history[0][6]) history.shift();
  }

  async function fetchAirports() {
    if (userLat == null || userLng == null) return;
    if (airportData) {
      renderAirports();
      return;
    }
    try {
      var resp = await fetch("airports.json");
      if (!resp.ok) return;
      airportData = await resp.json();
      renderAirports();
    } catch (e) { console.warn("Airport fetch failed:", e); }
  }

  function renderAirports() {
    airportLayer.clearLayers();
    if (!airportData || userLat == null || userLng == null) return;
    for (var i = 0; i < airportData.length; i++) {
      var ap = airportData[i];
      var dist = haversineKm(userLat, userLng, ap[1], ap[2]);
      if (dist > radiusKm) continue;
      var iata = ap[0], name = ap[3] || iata;
      (function(code, apName, lat, lng) {
        var m = L.circleMarker([lat, lng], {
          radius: 6, fillColor: "#2a3f55", fillOpacity: 1,
          color: "#8aa0b8", weight: 2
        })
        .bindTooltip(code, {
          permanent: true,
          direction: "right",
          offset: [8, 0],
          className: "airport-label",
          interactive: true,
          pane: "airportTooltipPane"
        })
        .on("click", function() { window.openFids(code, apName); })
        .addTo(airportLayer);
        var el = m.getTooltip() && m.getTooltip().getElement();
        if (el) el.addEventListener("click", function() { window.openFids(code, apName); });
      })(iata, name, ap[1], ap[2]);
    }
  }

  async function fetchRunways() {
    if (runwayData) return;
    try {
      var resp = await fetch("runways.json");
      if (!resp.ok) return;
      runwayData = await resp.json();
      renderRunways();
    } catch (e) {}
  }

  function renderRunways() {
    runwayLayer.clearLayers();
    if (!runwayData || userLat == null || userLng == null) return;
    for (var iata in runwayData) {
      var rwys = runwayData[iata];
      for (var j = 0; j < rwys.length; j++) {
        var r = rwys[j];
        var dist = haversineKm(userLat, userLng, (r[0]+r[3])/2, (r[1]+r[4])/2);
        if (dist > radiusKm) continue;
        L.polyline([[r[0],r[1]], [r[3],r[4]]], {
          color: "#7a8a9f", weight: 2.5, opacity: 0.7, dashArray: "8,5"
        }).bindTooltip(r[6], {
          permanent: false, direction: "center", className: "runway-label"
        }).addTo(runwayLayer);
      }
    }
  }

  function updateStatus() {
    var visible = aircraft.filter(function(a) { return !isFiltered(a); });
    var airborne = visible.filter(function(a) { return !a.ground; }).length;
    var grounded = visible.filter(function(a) { return a.ground; }).length;
    var el = document.getElementById("status-text");
    var controlsSubtitle = document.getElementById("controls-subtitle");
    var txt = '<span class="count">' + airborne + '</span> aircraft';
    if (grounded > 0) txt += ' &middot; <span style="color:#556677">' + grounded + ' ground</span>';
    el.innerHTML = txt;
    var stamp = new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit", second:"2-digit" });
    document.getElementById("status-time").textContent = stamp;
    if (controlsSubtitle) {
      if (!visible.length) {
        controlsSubtitle.textContent = "No aircraft in range";
      } else {
        var controlSummary = airborne + " airborne";
        if (grounded > 0) controlSummary += " · " + grounded + " ground";
        controlsSubtitle.textContent = controlSummary + " · " + stamp;
      }
    }
    var toggleBtn = document.getElementById("list-toggle");
    if (toggleBtn) toggleBtn.innerHTML = '<span class="label">Traffic</span><span class="count">' + visible.length + '</span>';
    updateControlsCompactSummary(visible.length);
  }

  function updateAlerts() {
    var bar = document.getElementById("alert-bar");
    var alerts = [];
    for (var i = 0; i < aircraft.length; i++) {
      var a = aircraft[i];
      if (isFiltered(a)) continue;
      var label = SQUAWK_ALERT[a.squawk];
      if (label || a.emergency) {
        var name = a.callsign || a.icao24;
        alerts.push(name + ": " + (label || a.emergency.toUpperCase()));
      }
    }
    if (alerts.length) {
      bar.textContent = alerts.join(" | ");
      bar.style.display = "block";
    } else {
      bar.style.display = "none";
    }
  }

  function altColor(altFt) {
    if (altFt == null) return "#8899aa";
    var t = Math.pow(Math.max(0, Math.min(1, altFt / 42000)), 0.4);
    // red(low) → orange → yellow → green → blue(high)
    var stops = [
      [0,     0, 95, 48],
      [0.2,  25, 95, 52],
      [0.4,  48, 95, 50],
      [0.65,120, 80, 45],
      [0.85,170, 70, 48],
      [1.0, 210, 75, 55]
    ];
    var i = 0;
    for (var j = 1; j < stops.length; j++) { if (t <= stops[j][0]) { i = j - 1; break; } }
    if (t > stops[stops.length - 1][0]) i = stops.length - 2;
    var a = stops[i], b = stops[i + 1];
    var f = (t - a[0]) / (b[0] - a[0]);
    var h = Math.round(a[1] + (b[1] - a[1]) * f);
    var s = Math.round(a[2] + (b[2] - a[2]) * f);
    var l = Math.round(a[3] + (b[3] - a[3]) * f);
    return "hsl(" + h + "," + s + "%," + l + "%)";
  }

  // --- Rendering ---
  const GROUND_TRAIL_MS = 15000;
  const trailLines = {};

  function trailWindowMs(a) {
    if (a.ground) return GROUND_TRAIL_MS;
    var zoom = map ? map.getZoom() : 11;
    if (zoom <= 8) return 16000;
    if (zoom <= 9) return 24000;
    if (zoom <= 10) return 34000;
    if (zoom <= 11) return 46000;
    if (zoom <= 12) return 62000;
    return 82000;
  }

  function trailStyle(ageNorm, isSelected, isSynthetic) {
    var opacityFloor = isSelected ? 0.28 : 0.12;
    var opacitySpan = isSelected ? 0.62 : 0.58;
    var exponent = isSelected ? 1.15 : 1.65;
    var opacity = opacityFloor + opacitySpan * Math.pow(1 - ageNorm, exponent);
    if (isSynthetic) opacity *= isSelected ? 0.86 : 0.72;
    return {
      opacity: opacity,
      weight: isSelected ? 3.3 : (isSynthetic ? 2.2 : 2.5)
    };
  }

  function displayedAircraftLatLng(id, fallback) {
    var marker = markerMap[id];
    if (marker) {
      var ll = marker.getLatLng();
      if (ll) return [ll.lat, ll.lng];
    }
    return fallback;
  }

  function localMetersFor(lat, lng) {
    var metersPerLat = 111320;
    var metersPerLng = Math.max(1, 111320 * Math.cos(userLat * Math.PI / 180));
    return {
      x: (lng - userLng) * metersPerLng,
      y: (lat - userLat) * metersPerLat
    };
  }

  function localMetersToLatLng(x, y) {
    var metersPerLat = 111320;
    var metersPerLng = Math.max(1, 111320 * Math.cos(userLat * Math.PI / 180));
    return [
      userLat + y / metersPerLat,
      userLng + x / metersPerLng
    ];
  }

  function clipSegmentToRadius(startLatLng, endLatLng) {
    if (userLat == null || userLng == null) return [startLatLng, endLatLng];
    var radiusM = radiusKm * 1000 + 5;
    var start = localMetersFor(startLatLng[0], startLatLng[1]);
    var end = localMetersFor(endLatLng[0], endLatLng[1]);
    var insideStart = start.x * start.x + start.y * start.y <= radiusM * radiusM;
    var insideEnd = end.x * end.x + end.y * end.y <= radiusM * radiusM;
    var dx = end.x - start.x;
    var dy = end.y - start.y;
    var quadA = dx * dx + dy * dy;
    if (quadA < 1e-6) return insideStart || insideEnd ? [startLatLng, endLatLng] : null;

    var quadB = 2 * (start.x * dx + start.y * dy);
    var quadC = start.x * start.x + start.y * start.y - radiusM * radiusM;
    var disc = quadB * quadB - 4 * quadA * quadC;
    var cuts = [];
    if (disc >= 0) {
      var sqrtDisc = Math.sqrt(disc);
      var t1 = (-quadB - sqrtDisc) / (2 * quadA);
      var t2 = (-quadB + sqrtDisc) / (2 * quadA);
      if (t1 >= 0 && t1 <= 1) cuts.push(t1);
      if (t2 >= 0 && t2 <= 1 && Math.abs(t2 - t1) > 1e-6) cuts.push(t2);
      cuts.sort(function(a, b) { return a - b; });
    }

    function pointAt(t) {
      return localMetersToLatLng(start.x + dx * t, start.y + dy * t);
    }

    if (insideStart && insideEnd) return [startLatLng, endLatLng];
    if (insideStart) return cuts.length ? [startLatLng, pointAt(cuts[cuts.length - 1])] : null;
    if (insideEnd) return cuts.length ? [pointAt(cuts[0]), endLatLng] : null;
    if (cuts.length >= 2) return [pointAt(cuts[0]), pointAt(cuts[cuts.length - 1])];
    return null;
  }

  function syncTrailEndpoint(id, latlng) {
    var segs = trailLines[id];
    if (!segs || !segs.length) return;
    var trail = posHistory[id];
    if (!trail || !trail.length) return;
    if (trail[trail.length - 1][5]) return;
    var lastSeg = segs[segs.length - 1];
    var latlngs = lastSeg.getLatLngs();
    if (!latlngs || latlngs.length < 2) return;
    var clipped = clipSegmentToRadius(
      [latlngs[0].lat, latlngs[0].lng],
      [latlng.lat, latlng.lng]
    );
    if (clipped) lastSeg.setLatLngs(clipped);
  }

  function renderTrails() {
    if (!filters.trails) {
      if (trailLayer.getLayers().length) trailLayer.clearLayers();
      for (var id in trailLines) delete trailLines[id];
      return;
    }

    var now = Date.now();
    var activeIds = {};

    for (var i = 0; i < aircraft.length; i++) {
      var a = aircraft[i];
      if (isFiltered(a)) continue;
      var trail = posHistory[a.icao24];
      if (!trail || trail.length < 2) continue;

      var startIdx = 0;
      var isSelected = selectedAircraftId === a.icao24;
      var trailMs = trailWindowMs(a);
      if (!isSelected) {
        for (var k = trail.length - 1; k >= 0; k--) {
          if (now - trail[k][2] > trailMs) { startIdx = k + 1; break; }
        }
      }
      if (trail.length - startIdx < 2) continue;

      var ageSpan = isSelected ? Math.max(1, now - trail[startIdx][2]) : trailMs;
      var segments = [];
      for (var j = Math.max(1, startIdx); j < trail.length; j++) {
        if (trail[j][5]) continue;
        var segGround = trail[j][4];
        var color = segGround ? GROUND_COLOR : altColor(trail[j][3]);
        var ageNorm = Math.max(0, Math.min(1, (now - trail[j][2]) / ageSpan));
        var isSynthetic = !!trail[j][6] || !!trail[j - 1][6];
        if (isSynthetic) ageNorm = Math.min(1, ageNorm * 1.25 + 0.08);
        var style = trailStyle(ageNorm, isSelected, isSynthetic);
        var endLatLng = [trail[j][0], trail[j][1]];
        if (j === trail.length - 1 && !trail[j][5]) {
          endLatLng = displayedAircraftLatLng(a.icao24, endLatLng);
        }
        var clippedSeg = clipSegmentToRadius([trail[j-1][0], trail[j-1][1]], endLatLng);
        if (!clippedSeg) continue;
        segments.push({
          latlngs: clippedSeg,
          color: color,
          opacity: style.opacity,
          weight: style.weight
        });
      }
      if (!segments.length) continue;

      activeIds[a.icao24] = true;
      var segs = trailLines[a.icao24] || (trailLines[a.icao24] = []);
      while (segs.length > segments.length) {
        trailLayer.removeLayer(segs.shift());
      }

      for (var si = 0; si < segments.length; si++) {
        var seg = segments[si];
        if (si < segs.length) {
          segs[si].setLatLngs(seg.latlngs);
          segs[si].setStyle({ color: seg.color, opacity: seg.opacity, weight: seg.weight });
        } else {
          var line = L.polyline(seg.latlngs, {
            color: seg.color, weight: seg.weight, opacity: seg.opacity,
            lineCap: "round", lineJoin: "round"
          }).addTo(trailLayer);
          segs.push(line);
        }
      }
    }

    for (var tid in trailLines) {
      if (!activeIds[tid]) {
        var old = trailLines[tid];
        for (var r = 0; r < old.length; r++) trailLayer.removeLayer(old[r]);
        delete trailLines[tid];
      }
    }
  }

  function buildPopup(a) {
    var name = a.callsign || a.icao24;
    var alName = !a.private ? airlineName(a.callsign) : null;
    var nameStr = alName ? name + " &middot; " + alName : name;
    var alt = a.ground ? "On ground" : (a.altFt != null ? a.altFt.toLocaleString() + " ft" : "—");
    var spd = a.speedKts != null ? a.speedKts + " kts" : "—";
    var vert = a.ground ? "" : vertLabel(a.vRate);
    var typeStr = a.aircraftType ? a.aircraftType : "";
    var regStr = a.registration ? a.registration : "";
    var typeLine = [typeStr, regStr].filter(Boolean).join(" &middot; ");
    if (typeLine) typeLine += "<br>";

    var machStr = a.mach ? "M" + a.mach.toFixed(2) : "";
    var iasStr = a.ias ? "IAS " + a.ias : "";
    var detail2 = [machStr, iasStr].filter(Boolean).join(" &middot; ");
    if (detail2) detail2 = '<span style="color:#8899aa">' + detail2 + "</span><br>";

    var windLine = "";
    if (a.windDir != null && a.windSpd != null) {
      windLine = '<span style="color:#667">Wind ' + a.windDir + "&deg; " + a.windSpd + " kts";
      if (a.oat != null) windLine += " &middot; OAT " + a.oat + "&deg;C";
      windLine += "</span><br>";
    }

    var emergLine = "";
    if (a.emergency || SQUAWK_ALERT[a.squawk]) {
      emergLine = '<span style="color:#f87171;font-weight:700">' + (SQUAWK_ALERT[a.squawk] || a.emergency.toUpperCase()) + "</span><br>";
    }

    var routeLine = "";
    var rc = routeCache[a.callsign];
    if (rc) {
      routeLine = '<span style="color:#5bbcf5">' + rc.display + "</span><br>";
    }

    return "<strong>" + nameStr + "</strong><br>" +
      emergLine + routeLine + typeLine + alt + " &middot; " + spd + " &middot; " + vert + "<br>" +
      detail2 + windLine +
      a.distKm + " km " + a.cardinal + "<br>" +
      '<span style="color:#667">ICAO: ' + a.icao24 + "</span>";
  }

  function bindPlaneLabel(marker, text, yOffset) {
    marker.bindTooltip(text, { permanent: true, direction: "top", offset: [0, -yOffset], className: "plane-label" });
  }

  function setSelectedAircraft(id) {
    if (selectedAircraftId === id) return;
    ignoreMapClickUntil = Date.now() + 250;
    selectedAircraftId = id;
    _lastPanelHtml = "";
    renderMap();
    renderPanel();
  }

  function isFiltered(a) {
    if (!filters.ground && a.ground) return true;
    if (!filters.private && a.private) return true;
    if (a.distKm == null || a.distKm > radiusKm) return true;
    return false;
  }

  function renderMarkers() {
    var seen = {};
    var now = Date.now();
    for (var i = 0; i < aircraft.length; i++) {
      var a = aircraft[i];
      if (isFiltered(a)) continue;
      seen[a.icao24] = true;
      var isSelected = selectedAircraftId === a.icao24;
      var icon = planeIcon(a.track, a.aircraftType, a.private, a.category, a.altFt, a.ground);
      var label = a.callsign || a.icao24;
      var existing = markerMap[a.icao24];

      var prev = extraState[a.icao24];
      var samples = prev && prev.samples ? prev.samples.slice() : [];
      var reportTs = now - Math.max(0, (a.seenPos || 0) * 1000);
      var lastSample = samples.length ? samples[samples.length - 1] : null;
      if (lastSample && reportTs <= lastSample.ts) reportTs = lastSample.ts + 1;
      samples.push({
        lat: a.lat,
        lng: a.lng,
        ts: reportTs,
        spdMs: (a.speedKts || 0) * 0.514444,
        trackRad: (a.track || 0) * Math.PI / 180
      });
      if (samples.length > 6) samples.splice(0, samples.length - 6);

      extraState[a.icao24] = {
        samples: samples,
        renderDelay: Math.min(Math.max(fetchInterval * 0.85, 1200), 5000)
      };

      if (existing) {
        existing.setIcon(icon);
        existing.setPopupContent(buildPopup(a));
        existing.setZIndexOffset(isSelected ? 1000 : 0);
        if (filters.labels) {
          if (existing.getTooltip()) {
            existing.setTooltipContent(label);
          } else {
            bindPlaneLabel(existing, label, icon.options.iconSize[1] / 2);
          }
        } else if (existing.getTooltip()) {
          existing.unbindTooltip();
        }
      } else {
        var marker = L.marker([a.lat, a.lng], { icon: icon }).bindPopup(buildPopup(a));
        marker.on("click", (function(id) {
          return function() { setSelectedAircraft(id); };
        })(a.icao24));
        marker.setZIndexOffset(isSelected ? 1000 : 0);
        if (filters.labels) {
          bindPlaneLabel(marker, label, icon.options.iconSize[1] / 2);
        }
        marker.addTo(aircraftLayer);
        markerMap[a.icao24] = marker;
      }
    }
    for (var id in markerMap) {
      if (!seen[id]) {
        aircraftLayer.removeLayer(markerMap[id]);
        delete markerMap[id];
        delete extraState[id];
      }
    }
    if (selectedAircraftId && !seen[selectedAircraftId]) selectedAircraftId = null;
  }

  function animateMarkers() {
    var now = Date.now();
    for (var id in extraState) {
      var marker = markerMap[id];
      if (!marker) continue;
      var st = extraState[id];
      var samples = st.samples;
      if (!samples || !samples.length) continue;

      var renderTs = now - st.renderDelay;
      var pos = [samples[0].lat, samples[0].lng];

      if (samples.length > 1 && renderTs > samples[0].ts) {
        var last = samples[samples.length - 1];
        if (renderTs >= last.ts) {
          pos = [last.lat, last.lng];
        } else {
          for (var i = 1; i < samples.length; i++) {
            var prev = samples[i - 1];
            var next = samples[i];
            if (renderTs <= next.ts) {
              var span = Math.max(1, next.ts - prev.ts);
              var t = (renderTs - prev.ts) / span;
              pos = [
                prev.lat + (next.lat - prev.lat) * t,
                prev.lng + (next.lng - prev.lng) * t
              ];
              break;
            }
          }
        }
      }

      var cur = marker.getLatLng();
      if (Math.abs(pos[0] - cur.lat) > 5e-6 || Math.abs(pos[1] - cur.lng) > 5e-6) {
        marker.setLatLng(pos);
      }
      syncTrailEndpoint(id, marker.getLatLng());
    }
    requestAnimationFrame(animateMarkers);
  }

  function renderMap() {
    renderMarkers();
    renderTrails();
  }

  function vertLabel(rate) {
    if (rate == null || Math.abs(rate) < 0.5) return '<span class="vert-level">—</span>';
    if (rate > 0) return '<span class="vert-up">&uarr; climbing</span>';
    return '<span class="vert-down">&darr; descending</span>';
  }

  function vertClass(rate) {
    if (rate == null || Math.abs(rate) < 0.5) return "vert-level";
    return rate > 0 ? "vert-up" : "vert-down";
  }

  function vertArrow(rate) {
    if (rate == null || Math.abs(rate) < 0.5) return "—";
    return rate > 0 ? "\u2197" : "\u2198";
  }

  var _lastPanelHtml = "";

  function renderPanel() {
    var panel = document.getElementById("panel");
    var visible = aircraft.filter(function(a) { return !isFiltered(a); });
    if (!visible.length) {
      var empty = '<div class="panel-empty">No aircraft detected nearby</div>';
      if (_lastPanelHtml !== empty) { panel.innerHTML = empty; _lastPanelHtml = empty; }
      return;
    }

    var html = "";
    for (var i = 0; i < visible.length; i++) {
      var a = visible[i];
      var name = a.callsign || a.icao24;
      var selectedClass = selectedAircraftId === a.icao24 ? " selected" : "";
      var nameClass = a.callsign ? "" : " unknown";
      var privTag = a.private ? '<span class="priv-tag">PRIVATE</span>' : "";
      var alName = !a.private ? airlineName(a.callsign) : null;
      var alTag = alName ? '<span class="airline-name">' + alName + "</span>" : "";
      var alt = a.ground ? '<span style="color:#556677">On ground</span>' : (a.altFt != null ? a.altFt.toLocaleString() + " ft" : "—");
      var spd = a.speedKts != null ? a.speedKts + " kts" : "";
      var vc = a.ground ? "vert-level" : vertClass(a.vRate);
      var va = a.ground ? "" : vertArrow(a.vRate);
      var emergClass = (a.emergency || SQUAWK_ALERT[a.squawk]) ? " emergency" : "";

      var detailParts = [a.aircraftType, alt, spd, '<span class="' + vc + '">' + va + "</span>"].filter(Boolean);

      var routeHtml = "";
      if (a.callsign && routeCache[a.callsign]) {
        routeHtml = '<div class="route-line">' + routeCache[a.callsign].display + "</div>";
      }

      html += "<div class=\"card" + selectedClass + emergClass + "\" onclick=\"flyTo('" + a.icao24 + "'," + a.lat + "," + a.lng + ")\">" +
        '<div class="main">' +
          '<div class="callsign' + nameClass + '">' + name + privTag + alTag + "</div>" +
          routeHtml +
          '<div class="details">' + detailParts.join(" &middot; ") + "</div>" +
        "</div>" +
        '<div class="distance"><span class="distance-num">' + a.distKm + '</span><span class="distance-unit">km</span><span class="bearing-tag">' + a.cardinal + "</span></div>" +
      "</div>";
    }
    if (html !== _lastPanelHtml) { panel.innerHTML = html; _lastPanelHtml = html; }
  }

  window.flyTo = function(id, lat, lng) {
    setSelectedAircraft(id);
    document.getElementById("list-sheet").classList.remove("open");
    map.flyTo([lat, lng], Math.max(map.getZoom(), 13), { duration: 0.75, easeLinearity: 0.18 });
  };

  // --- Geolocation ---
  function startGeolocation() {
    if (!navigator.geolocation) {
      showError("Geolocation not supported");
      return;
    }
    navigator.geolocation.watchPosition(
      function(pos) { updateUserPosition(pos.coords.latitude, pos.coords.longitude); },
      function() {},
      { enableHighAccuracy: true, maximumAge: 10000 }
    );
  }

  function showError(msg) {
    document.getElementById("loading-text").textContent = msg;
  }

  function scheduleTrailBreaks() {
    trailBreakPending = {};
    for (var id in posHistory) trailBreakPending[id] = true;
  }

  function handlePageResume() {
    if (!map) return;
    lastFetchTs = 0;
    fetchInterval = REFRESH_MS;
    scheduleTrailBreaks();
    clearRadiusFetchTimer();
    resetInterpolationSamples();
    fetchAircraft();
  }

  // --- Init ---
  function boot(lat, lng) {
    document.getElementById("loading").style.display = "none";
    syncUrlState();
    updateFilterButtons();
    updateRadiusUi();
    initMap(lat, lng);
    updateUserPosition(lat, lng);
    updateFocusView(true);
    fetchAircraft();
    fetchAirports();
    fetchRunways();
    refreshTimer = setInterval(fetchAircraft, REFRESH_MS);
    requestAnimationFrame(animateMarkers);
    startGeolocation();
    document.addEventListener("visibilitychange", function() {
      if (!document.hidden) handlePageResume();
    });
    window.addEventListener("pageshow", function(e) {
      if (e.persisted) handlePageResume();
    });
  }

  // --- Controls dock ---
  (function() {
    var controls = document.getElementById("map-controls");
    var toggle = document.getElementById("controls-toggle");
    if (!controls || !toggle) return;
    setControlsExpanded(false);
    toggle.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();
      setControlsExpanded(!controls.classList.contains("expanded"));
    });
    controls.addEventListener("click", function(e) {
      e.stopPropagation();
    });
    document.addEventListener("click", function(e) {
      if (!controls.classList.contains("expanded")) return;
      if (controls.contains(e.target)) return;
      setControlsExpanded(false);
    });
  })();

  // --- Traffic drawer ---
  (function() {
    var sheet = document.getElementById("list-sheet");
    var toggle = document.getElementById("list-toggle");
    var backdrop = document.getElementById("list-backdrop");
    var closeBtn = document.getElementById("list-close");

    function setListOpen(open) {
      sheet.classList.toggle("open", !!open);
      if (open) setControlsExpanded(false);
    }

    toggle.addEventListener("click", function() { setListOpen(true); });
    backdrop.addEventListener("click", function() { setListOpen(false); });
    closeBtn.addEventListener("click", function() { setListOpen(false); });
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && sheet.classList.contains("open") &&
          !document.getElementById("fids").classList.contains("open")) {
        setListOpen(false);
      }
    });
  })();

  // --- Radius slider ---
  (function() {
    var slider = document.getElementById("radius-slider");
    if (!slider) return;
    slider.addEventListener("input", function() {
      setRadiusKm(this.value, { fitView: false, fetchMode: "debounced", fetchDelay: 260 });
    });
    slider.addEventListener("change", function() {
      setRadiusKm(this.value, { fitView: true, fetchMode: "immediate" });
    });
    updateRadiusUi();
  })();

  // --- Filter toggles ---
  (function() {
    var btns = document.querySelectorAll("#visibility-controls .ftag");
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener("click", function() {
        var f = this.getAttribute("data-f");
        filters[f] = !filters[f];
        updateFilterButtons();
        renderMap();
        renderPanel();
        updateStatus();
        updateAlerts();
      });
    }
    updateFilterButtons();
  })();

  if (!isNaN(paramLat) && !isNaN(paramLng)) {
    boot(paramLat, paramLng);
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) { boot(pos.coords.latitude, pos.coords.longitude); },
      function() { showError("Location access denied. Please allow location or use the Siri Shortcut."); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  } else {
    showError("Geolocation not supported in this browser.");
  }

  // --- FIDS (airport schedule board) ---
  var _fidsData = null;
  var _fidsDir = "arrivals";

  function fidsTime(ts) {
    if (!ts) return "\u2014";
    return new Date(ts * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function renderFidsTab() {
    var flights = _fidsData ? (_fidsData[_fidsDir] || []) : [];
    var body = document.getElementById("fids-body");
    if (!flights.length) {
      body.innerHTML = '<div class="fids-empty">No flights found</div>';
      return;
    }
    var isArr = _fidsDir === "arrivals";
    var html = "";
    for (var i = 0; i < flights.length; i++) {
      var f = flights[i];
      var color = f.color || "gray";
      var sched = fidsTime(isArr ? f.sched_arr : f.sched_dep);
      var est = fidsTime(isArr ? f.est_arr : f.est_dep);
      var actual = fidsTime(isArr ? f.actual_arr : f.actual_dep);
      var route = isArr
        ? (f.from_iata ? "from " + f.from_iata : "")
        : (f.to_iata ? "to " + f.to_iata : "");
      if (f.ac_code) route = route ? route + " \u00b7 " + f.ac_code : f.ac_code;
      html += '<div class="fids-row">' +
        '<div class="fids-top">' +
          '<div><span class="fids-flight-num">' + (f.flight || "\u2014") + '</span>' +
          '<span class="fids-airline-name">' + (f.airline || "") + '</span></div>' +
          '<span class="fids-badge ' + color + '">' + (f.status || "\u2014") + '</span>' +
        '</div>' +
        (route ? '<div class="fids-route">' + route + '</div>' : '') +
        '<div class="fids-times">' +
          '<span>Sched ' + sched + '</span>' +
          '<span>Est ' + est + '</span>' +
          '<span class="ft-actual">Act ' + actual + '</span>' +
        '</div></div>';
    }
    body.innerHTML = html;
  }

  window.openFids = function(iata, name) {
    document.getElementById("fids-title").textContent = iata;
    document.getElementById("fids-subtitle").textContent = name || "";
    document.getElementById("fids-body").innerHTML =
      '<div class="fids-empty"><div class="spinner"></div><br>Loading schedule\u2026</div>';
    _fidsDir = "arrivals";
    var tabs = document.querySelectorAll(".fids-tab");
    for (var t = 0; t < tabs.length; t++)
      tabs[t].classList.toggle("active", tabs[t].getAttribute("data-dir") === "arrivals");
    document.getElementById("fids").classList.add("open");

    var schedUrl = (isLocal ? "/api/fr24/schedule/" : WORKER_URL + "/schedule/") + encodeURIComponent(iata);
    fetch(schedUrl)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          document.getElementById("fids-body").innerHTML =
            '<div class="fids-empty">' + data.error + '</div>';
          return;
        }
        _fidsData = data;
        if (data.name) document.getElementById("fids-subtitle").textContent = data.name;
        renderFidsTab();
      })
      .catch(function() {
        document.getElementById("fids-body").innerHTML =
          '<div class="fids-empty">Failed to load schedule</div>';
      });
  };

  window.closeFids = function() {
    document.getElementById("fids").classList.remove("open");
    _fidsData = null;
  };

  (function() {
    document.getElementById("fids-backdrop").addEventListener("click", window.closeFids);
    document.getElementById("fids-close").addEventListener("click", window.closeFids);
    var tabs = document.querySelectorAll(".fids-tab");
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].addEventListener("click", function() {
        _fidsDir = this.getAttribute("data-dir");
        for (var j = 0; j < tabs.length; j++) tabs[j].classList.toggle("active", tabs[j] === this);
        renderFidsTab();
      });
    }
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && document.getElementById("fids").classList.contains("open"))
        window.closeFids();
    });
  })();
})();
</script>
</body>
</html>
